<!doctype html>
<html>
  <head>
    <title>All Employees</title>
    <link rel="stylesheet" href="styles/employees.css" />
  </head>
  <body>
    <script>
      const token = localStorage.getItem("token");
      const authority = localStorage.getItem("authority");

      if (!token || authority !== "ADMIN") {
        window.location.href = "login.html";
      }
    </script>

    <div class="navbar">
      <h1>Task Manager</h1>
      <span>Welcome, <strong id="loggedInUser"></strong></span>
    </div>

    <div id="spinner">
      <div class="spinner"></div>
    </div>

    <div id="content">
      <div class="container">
        <div class="card">
          <h2>All Employees</h2>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Username</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Profile</th>
              </tr>
            </thead>
            <tbody id="employeeList"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      document.getElementById("loggedInUser").textContent =
        localStorage.getItem("username");

      async function loadEmployees() {
        try {
          const response = await fetch(
            "http://localhost:8080/security-practice/employees",
            {
              method: "GET",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + token,
              },
            },
          );

          if (response.ok) {
            const employees = await response.json();
            const tbody = document.getElementById("employeeList");

            if (employees.length === 0) {
              tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:#888;">No employees found</td></tr>`;
            } else {
              employees.forEach((emp) => {
                const badgeClass =
                  emp.authority === "ADMIN" ? "badge-admin" : "badge-user";
                const tr = document.createElement("tr");
                tr.innerHTML = `
                  <td>${emp.id}</td>
                  <td>${emp.username}</td>
                  <td>${emp.firstName}</td>
                  <td>${emp.lastName}</td>
                  <td>${emp.email}</td>
                  <td><span class="badge ${badgeClass}">${emp.authority}</span></td>
                  <td><a class="profile-link" href="employee.html?username=${emp.username}">View Profile</a></td>
                `;
                tbody.appendChild(tr);
              });
            }
          } else {
            alert("Access denied or error loading employees");
          }
        } finally {
          document.getElementById("spinner").style.display = "none";
          document.getElementById("content").style.display = "block";
        }
      }

      loadEmployees();
    </script>
  </body>
</html>
