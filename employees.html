<!doctype html>
<html>
  <head>
    <title>All Employees</title>
    <link rel="stylesheet" href="styles/employees.css" />
    <script src="scripts/employee/employees.js" defer></script>
  </head>
  <body>
    <div class="navbar">
      <h1>Task Manager</h1>
      <nav id="navLinks" style="display: flex; gap: 15px; align-items: center">
        <a
          id="profileLink"
          href="#"
          style="color: white; text-decoration: none; font-size: 14px"
          >My Profile</a
        >
        <a
          id="tasksLink"
          href="tasks.html"
          style="
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: none;
          "
          >Tasks</a
        >
      </nav>
      <span
        >Welcome, <strong id="loggedInUser"></strong>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </span>
    </div>

    <div id="spinner">
      <div class="spinner"></div>
    </div>

    <div id="content">
      <div class="container">
        <div class="card">
          <h2>All Employees</h2>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Username</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Profile</th>
              </tr>
            </thead>
            <tbody id="employeeList"></tbody>
          </table>
        </div>
      </div>
    </div>
    <script>
      const token = localStorage.getItem("token");
      const authority = localStorage.getItem("authority");

      if (!token || authority !== "ADMIN") {
        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
