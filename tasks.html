<!doctype html>
<html>
  <head>
    <title>Tasks</title>
    <link rel="stylesheet" href="styles/tasks.css" />
    <script src="scripts/tasks/tasks.js" defer></script>
  </head>
  <body>
    <script>
      const token = localStorage.getItem("token");
      const authority = localStorage.getItem("authority");

      if (!token) {
        window.location.href = "login.html";
      }

      if (authority !== "ADMIN") {
        window.location.href = "employee.html";
      }
    </script>

    <div class="navbar">
      <h1>Task Manager</h1>
      <nav id="navLinks" style="display: flex; gap: 15px; align-items: center">
        <a
          id="profileLink"
          href="#"
          style="color: white; text-decoration: none; font-size: 14px"
          >My Profile</a
        >
        <a
          id="tasksLink"
          href="tasks.html"
          style="
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: none;
          "
          >Tasks</a
        >
      </nav>
      <span
        >Welcome, <strong id="loggedInUser"></strong>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </span>
    </div>

    <div class="container">
      <div class="card">
        <div class="card-header">
          <h2>All Tasks</h2>
          <button class="load-btn" onclick="loadTasks()">Load Tasks</button>
        </div>

        <div id="spinner" style="display: none">
          <div class="spinner"></div>
        </div>

        <div id="taskList">
          <p class="no-tasks">Click "Load Tasks" to view all tasks</p>
        </div>
      </div>
    </div>
  </body>
</html>
