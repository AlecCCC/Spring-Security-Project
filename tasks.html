<!doctype html>
<html>
  <head>
    <title>Tasks</title>
    <link rel="stylesheet" href="styles/tasks.css" />
  </head>
  <body>
    <script>
      const token = localStorage.getItem("token");
      const authority = localStorage.getItem("authority");

      if (!token) {
        window.location.href = "login.html";
      }

      if (authority !== "ADMIN") {
        window.location.href = "employee.html";
      }
    </script>

    <div class="navbar">
      <h1>Task Manager</h1>
      <nav id="navLinks" style="display: flex; gap: 15px; align-items: center">
        <a
          id="profileLink"
          href="#"
          style="color: white; text-decoration: none; font-size: 14px"
          >My Profile</a
        >
        <a
          id="tasksLink"
          href="tasks.html"
          style="
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: none;
          "
          >Tasks</a
        >
      </nav>
      <span
        >Welcome, <strong id="loggedInUser"></strong>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </span>
    </div>

    <div class="container">
      <div class="card">
        <div class="card-header">
          <h2>All Tasks</h2>
          <button class="load-btn" onclick="loadTasks()">Load Tasks</button>
        </div>

        <div id="spinner" style="display: none">
          <div class="spinner"></div>
        </div>

        <div id="taskList">
          <p class="no-tasks">Click "Load Tasks" to view all tasks</p>
        </div>
      </div>
    </div>

    <script>
      document.getElementById("loggedInUser").textContent =
        localStorage.getItem("username");

      function getStatusClass(status) {
        switch (status.toLowerCase()) {
          case "todo":
            return "status-todo";
          case "in_progress":
            return "status-in_progress";
          case "done":
            return "status-done";
          default:
            return "status-todo";
        }
      }

      async function loadTasks() {
        const taskList = document.getElementById("taskList");
        const spinner = document.getElementById("spinner");

        // show spinner
        taskList.style.display = "none";
        spinner.style.display = "flex";

        try {
          const response = await fetch(
            "http://localhost:8080/security-practice/task",
            {
              method: "GET",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + token,
              },
            },
          );

          if (response.ok) {
            const tasks = await response.json();
            taskList.innerHTML = "";

            if (tasks.length === 0) {
              taskList.innerHTML = `<p class="no-tasks">No tasks found</p>`;
            } else {
              tasks.forEach((task) => {
                const statusClass = getStatusClass(task.status);
                const div = document.createElement("div");
                div.className = "task-item";
                div.id = `task-${task.id}`;
                div.innerHTML = `
                <a href="task.html?id=${task.id}" style="text-decoration: none; color: inherit;">
                  <div class="task-title">
                    ${task.title}
                    <span class="task-status ${statusClass}">${task.status}</span>
                  </div>
                  <div class="task-meta">
                    Assigned to: ${task.assignedToUsername} · 
                    Assigned by: ${task.assignedByUsername} · 
                    Due: ${task.dueDate}
                  </div>
                </a>
                <button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
            `;
                taskList.appendChild(div);
              });
            }
          } else {
            taskList.innerHTML = `<p class="no-tasks">Access denied or not logged in</p>`;
          }
        } finally {
          spinner.style.display = "none";
          taskList.style.display = "block";
        }
      }

      async function deleteTask(id) {
        if (!confirm(`Are you sure you want to delete task #${id}?`)) {
          return;
        }

        const response = await fetch(
          `http://localhost:8080/security-practice/task/${id}`,
          {
            method: "DELETE",
            headers: {
              Authorization: "Bearer " + token,
            },
          },
        );

        if (response.ok) {
          // remove the task from the page without reloading
          document.getElementById(`task-${id}`).remove();
        } else {
          alert("Failed to delete task");
        }
      }
    </script>
  </body>
</html>
