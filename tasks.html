<!doctype html>
<html>
  <head>
    <title>Tasks</title>
    <link rel="stylesheet" href="styles/tasks.css" />
  </head>
  <body>
    <script>
      const token = localStorage.getItem("token");
      const authority = localStorage.getItem("authority");

      if (!token || authority !== "ADMIN") {
        window.location.href = "login.html";
      }
    </script>

    <div class="navbar">
      <h1>Task Manager</h1>
      <span>Welcome, <strong id="loggedInUser"></strong></span>
    </div>

    <div class="container">
      <div class="card">
        <div class="card-header">
          <h2>All Tasks</h2>
          <button class="load-btn" onclick="loadTasks()">Load Tasks</button>
        </div>

        <div id="spinner" style="display: none">
          <div class="spinner"></div>
        </div>

        <div id="taskList">
          <p class="no-tasks">Click "Load Tasks" to view all tasks</p>
        </div>
      </div>
    </div>

    <script>
      document.getElementById("loggedInUser").textContent =
        localStorage.getItem("username");

      function getStatusClass(status) {
        switch (status.toLowerCase()) {
          case "todo":
            return "status-todo";
          case "in_progress":
            return "status-in_progress";
          case "done":
            return "status-done";
          default:
            return "status-todo";
        }
      }

      async function loadTasks() {
        const taskList = document.getElementById("taskList");
        const spinner = document.getElementById("spinner");

        // show spinner
        taskList.style.display = "none";
        spinner.style.display = "flex";

        try {
          const response = await fetch(
            "http://localhost:8080/security-practice/task",
            {
              method: "GET",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + token,
              },
            },
          );

          if (response.ok) {
            const tasks = await response.json();
            taskList.innerHTML = "";

            if (tasks.length === 0) {
              taskList.innerHTML = `<p class="no-tasks">No tasks found</p>`;
            } else {
              tasks.forEach((task) => {
                const statusClass = getStatusClass(task.status);
                const div = document.createElement("div");
                div.className = "task-item";
                div.innerHTML = `
                  <div class="task-title">
                    ${task.title}
                    <span class="task-status ${statusClass}">${task.status}</span>
                  </div>
                  <div class="task-meta">
                    Assigned to: ${task.assignedToUsername} · 
                    Assigned by: ${task.assignedByUsername} · 
                    Due: ${task.dueDate}
                  </div>
                `;
                taskList.appendChild(div);
              });
            }
          } else {
            taskList.innerHTML = `<p class="no-tasks">Access denied or not logged in</p>`;
          }
        } finally {
          spinner.style.display = "none";
          taskList.style.display = "block";
        }
      }
    </script>
  </body>
</html>
