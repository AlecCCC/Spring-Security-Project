<!doctype html>
<html>
  <head>
    <title>My Profile</title>
    <link rel="stylesheet" href="styles/employee.css" />
  </head>
  <body>
    <div id="spinner">
      <div class="spinner"></div>
    </div>

    <div id="content">
      <div class="navbar">
        <h1>Task Manager</h1>
        <nav
          id="navLinks"
          style="display: flex; gap: 15px; align-items: center"
        >
          <a
            id="profileLink"
            href="#"
            style="color: white; text-decoration: none; font-size: 14px"
            >My Profile</a
          >
          <a
            id="tasksLink"
            href="tasks.html"
            style="
              color: white;
              text-decoration: none;
              font-size: 14px;
              display: none;
            "
            >Tasks</a
          >
        </nav>
        <span
          >Welcome, <strong id="loggedInUser"></strong>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </span>
      </div>

      <div class="container">
        <div class="card">
          <h2 id="profileTitle">My Profile</h2>
          <div class="profile-grid" id="profileInfo"></div>
        </div>

        <div class="card">
          <h2>My Tasks</h2>
          <div id="taskList"></div>
        </div>
      </div>
    </div>

    <script src="scripts/employee/employee.js"></script>
  </body>
</html>
