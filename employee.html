<!doctype html>
<html>
  <head>
    <title>My Profile</title>
    <link rel="stylesheet" href="styles/employee.css"></link>
  </head>
  <body>
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const usernameFromUrl = urlParams.get("username");
      const loggedInUsername = localStorage.getItem("username");
      const authority = localStorage.getItem("authority");

      if (
        !loggedInUsername ||
        (usernameFromUrl !== loggedInUsername && authority !== "ADMIN")
      ) {
        window.location.href = "login.html";
      }
    </script>

    <div id="spinner">
      <div class="spinner"></div>
    </div>

    <div id="content">
      <div class="navbar">
        <h1>Task Manager</h1>
        <span>Welcome, <strong id="loggedInUser"></strong></span>
      </div>

      <div class="container">
        <!-- profile card -->
        <div class="card">
          <h2>My Profile</h2>
          <div class="profile-grid" id="profileInfo"></div>
        </div>

        <!-- tasks card -->
        <div class="card">
          <h2>My Tasks</h2>
          <div id="taskList"></div>
        </div>
      </div>
    </div>

    <script>
      const token = localStorage.getItem("token");
      const employeeId = localStorage.getItem("employeeId");

      document.getElementById("loggedInUser").textContent = loggedInUsername;

      function getStatusClass(status) {
        switch (status.toLowerCase()) {
          case "todo":
            return "status-todo";
          case "in_progress":
            return "status-in_progress";
          case "done":
            return "status-done";
          default:
            return "status-todo";
        }
      }

      async function loadEmployee() {
        try {
          const response = await fetch(
            `http://localhost:8080/security-practice/employees/${employeeId}`,
            {
              method: "GET",
              headers: {
                "Content-Type": "application/json",
                Authorization: "Bearer " + token,
              },
            },
          );

          if (response.ok) {
            const data = await response.json();

            // render profile
            const badgeClass =
              data.authority === "ADMIN" ? "badge-admin" : "badge-user";
            document.getElementById("profileInfo").innerHTML = `
              <div class="profile-item">
                <label>Username</label>
                <p>${data.username}</p>
              </div>
              <div class="profile-item">
                <label>First Name</label>
                <p>${data.firstName}</p>
              </div>
              <div class="profile-item">
                <label>Last Name</label>
                <p>${data.lastName}</p>
              </div>
              <div class="profile-item">
                <label>Email</label>
                <p>${data.email}</p>
              </div>
              <div class="profile-item">
                <label>Role</label>
                <p><span class="badge ${badgeClass}">${data.authority}</span></p>
              </div>
            `;

            // render tasks
            const taskList = document.getElementById("taskList");

            if (data.assignedTasks.length === 0) {
              taskList.innerHTML = `<p class="no-tasks">No tasks assigned</p>`;
            } else {
              data.assignedTasks.forEach((task) => {
                const statusClass = getStatusClass(task.status);
                const div = document.createElement("div");
                div.className = "task-item";
                div.innerHTML = `
                  <div class="task-title">
                    ${task.title}
                    <span class="task-status ${statusClass}">${task.status}</span>
                  </div>
                  <div class="task-meta">
                    Due: ${task.dueDate} · Assigned by: ${task.assignedByUsername}
                  </div>
                `;
                taskList.appendChild(div);
              });
            }
          } else if (response.status === 403) {
            alert("Access denied");
          } else {
            alert("Error loading profile");
          }
        } finally {
          document.getElementById("spinner").style.display = "none";
          document.getElementById("content").style.display = "block";
        }
      }

      loadEmployee();
    </script>
  </body>
</html>
