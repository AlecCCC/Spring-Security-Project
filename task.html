<!doctype html>
<html>
  <head>
    <title>Task</title>
    <link rel="stylesheet" href="styles/task.css" />
    <script src="scripts/tasks/task.js" defer></script>
  </head>
  <body>
    <div class="navbar">
      <h1>Task Manager</h1>
      <nav id="navLinks" style="display: flex; gap: 15px; align-items: center">
        <a
          id="profileLink"
          href="#"
          style="color: white; text-decoration: none; font-size: 14px"
          >My Profile</a
        >
        <a
          id="tasksLink"
          href="tasks.html"
          style="
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: none;
          "
          >Tasks</a
        >
      </nav>
      <span
        >Welcome, <strong id="loggedInUser"></strong>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </span>
    </div>

    <div id="spinner">
      <div class="spinner"></div>
    </div>

    <div id="content">
      <div class="container">
        <div class="card">
          <div class="card-header">
            <h2>Task Details</h2>
          </div>

          <div class="detail-grid">
            <div class="detail-item">
              <label>Title</label>
              <p id="taskTitle"></p>
            </div>
            <div class="detail-item">
              <label>Status</label>
              <p id="taskStatus"></p>
            </div>
            <div class="detail-item">
              <label>Due Date</label>
              <p id="taskDueDate"></p>
            </div>
            <div class="detail-item">
              <label>Assigned To</label>
              <p id="taskAssignedTo"></p>
            </div>
            <div class="detail-item">
              <label>Assigned By</label>
              <p id="taskAssignedBy"></p>
            </div>
            <div class="detail-item full-width">
              <label>Description</label>
              <p id="taskDescription"></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
