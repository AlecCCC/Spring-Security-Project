<!doctype html>
<html>
  <head>
    <title>Create Task</title>
    <link rel="stylesheet" href="styles/createtask.css" />
  </head>
  <body>
    <div class="navbar">
      <h1>Task Manager</h1>
      <nav id="navLinks" style="display: flex; gap: 15px; align-items: center">
        <a
          id="profileLink"
          href="#"
          style="color: white; text-decoration: none; font-size: 14px"
          >My Profile</a
        >
        <a
          id="createTaskLink"
          href="createTask.html"
          style="
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: none;
          "
        >
          Create Task
        </a>
        <a
          id="tasksLink"
          href="tasks.html"
          style="
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: none;
          "
          >Tasks</a
        >
        <a
          id="employeesLink"
          href="employees.html"
          style="
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: none;
          "
        >
          Employees
        </a>
      </nav>
      <span
        >Welcome, <strong id="loggedInUser"></strong>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </span>
    </div>

    <div class="container">
      <div class="card">
        <h2>Create Task</h2>

        <div class="form-group">
          <label>Title</label>
          <input type="text" id="title" placeholder="Enter task title" />
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea
            id="description"
            placeholder="Enter task description"
          ></textarea>
        </div>

        <div class="form-group">
          <label>Status</label>
          <select id="status">
            <option value="TODO">TODO</option>
            <option value="IN_PROGRESS">IN PROGRESS</option>
            <option value="DONE">DONE</option>
          </select>
        </div>

        <div class="form-group">
          <label>Due Date</label>
          <input type="date" id="dueDate" />
        </div>

        <div class="form-group">
          <label>Assigned To</label>
          <select id="assignedTo">
            <option value="">Select Employee</option>
          </select>
        </div>

        <div class="form-group">
          <label>Assigned By</label>
          <select id="assignedBy">
            <option value="">Select Employee</option>
          </select>
        </div>

        <button onclick="createTask()">Create Task</button>

        <div class="message" id="message"></div>
      </div>
    </div>

    <script src="scripts/tasks/createTask.js"></script>
  </body>
</html>
